<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 610" role="img" aria-labelledby="title desc">
  <title id="title">Autonomous agent decision cycle</title>
  <desc id="desc">Each round the agent reads the board, identifies controlled wizards, selects targets, searches routes, applies priorities and issues actions.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="middle">
    <g fill="none" stroke="#475569" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)">
      <path d="M325 88 V112"/>
      <path d="M325 180 V204"/>
      <path d="M325 272 V296"/>
      <path d="M325 364 V388"/>
      <path d="M325 456 V480"/>
      <path d="M110 514 C38 514 38 54 110 54"/>
    </g>

    <g>
      <rect x="110" y="20" width="430" height="68" rx="14" fill="#e0f2fe" stroke="#0369a1" stroke-width="2"/>
      <circle cx="150" cy="54" r="19" fill="#0369a1"/>
      <text x="150" y="60" fill="#ffffff" font-size="16" font-weight="700">1</text>
      <text x="335" y="50" fill="#0f172a" font-size="19" font-weight="700">Read the board state</text>
      <text x="335" y="72" fill="#334155" font-size="14">positions, ownership and round phase</text>
    </g>
    <g>
      <rect x="110" y="112" width="430" height="68" rx="14" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
      <circle cx="150" cy="146" r="19" fill="#475569"/>
      <text x="150" y="152" fill="#ffffff" font-size="16" font-weight="700">2</text>
      <text x="335" y="142" fill="#0f172a" font-size="19" font-weight="700">Find controlled wizards</text>
      <text x="335" y="164" fill="#334155" font-size="14">evaluate each unit independently</text>
    </g>
    <g>
      <rect x="110" y="204" width="430" height="68" rx="14" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
      <circle cx="150" cy="238" r="19" fill="#475569"/>
      <text x="150" y="244" fill="#ffffff" font-size="16" font-weight="700">3</text>
      <text x="335" y="234" fill="#0f172a" font-size="19" font-weight="700">Choose a target</text>
      <text x="335" y="256" fill="#334155" font-size="14">books, rivals or special objectives</text>
    </g>
    <g>
      <rect x="110" y="296" width="430" height="68" rx="14" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
      <circle cx="150" cy="330" r="19" fill="#475569"/>
      <text x="150" y="336" fill="#ffffff" font-size="16" font-weight="700">4</text>
      <text x="335" y="326" fill="#0f172a" font-size="19" font-weight="700">Search routes with BFS</text>
      <text x="335" y="348" fill="#334155" font-size="14">find a reachable first movement</text>
    </g>
    <g>
      <rect x="110" y="388" width="430" height="68" rx="14" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
      <circle cx="150" cy="422" r="19" fill="#b45309"/>
      <text x="150" y="428" fill="#ffffff" font-size="16" font-weight="700">5</text>
      <text x="335" y="418" fill="#0f172a" font-size="19" font-weight="700">Apply phase priorities</text>
      <text x="335" y="440" fill="#334155" font-size="14">conversion, ghosts, spells and fallbacks</text>
    </g>
    <g>
      <rect x="110" y="480" width="430" height="68" rx="14" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
      <circle cx="150" cy="514" r="19" fill="#15803d"/>
      <text x="150" y="520" fill="#ffffff" font-size="16" font-weight="700">6</text>
      <text x="335" y="510" fill="#0f172a" font-size="19" font-weight="700">Issue one action per wizard</text>
      <text x="335" y="532" fill="#334155" font-size="14">repeat from the new state next round</text>
    </g>
    <text x="69" y="286" fill="#475569" font-size="13" font-weight="700" transform="rotate(-90 69 286)">NEXT ROUND</text>
  </g>
</svg>
